name: Update Infrastructure Signals

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  run-scripts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run signal generator
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/generate_signals_from_api.py

      - name: Promote signals
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/promote_signals_to_projects.py

      - name: Enrich leads
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/enrich_leads.py
