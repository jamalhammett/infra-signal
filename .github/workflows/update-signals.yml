name: Update Infrastructure Signals

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  run-scripts:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run signal generator
        run: python scripts/generate_signals_from_api.py

      - name: Promote signals
        run: python scripts/promote_signals_to_projects.py

      - name: Enrich leads
        run: python scripts/enrich_leads.py

      - name: Tag Infrastructure Intelligence
        run: python scripts/tag_projects.py

      - name: Geocode Projects
        run: python scripts/geocode_projects.py
